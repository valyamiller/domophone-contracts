{% extends "base.html" %}

{% block content %}
<h2>Добавление нового клиента</h2>

<div class="info-box info-blue">
    <strong>Лицевой счёт</strong> будет сгенерирован автоматически после добавления клиента.<br>
    <strong>Договор оформит:</strong> {{ current_user.full_name }}
</div>

<form method="POST" class="form">
    <div class="form-group">
        <label for="full_name">ФИО:</label>
        <input type="text" id="full_name" name="full_name" required>
    </div>
    
    <div class="form-group">
        <label for="microdistrict">Микрорайон:</label>
        <input type="text" id="microdistrict" name="microdistrict" placeholder="например: Центральный" required>
    </div>
    
    <div class="form-group">
        <label for="house">Дом:</label>
        <input type="text" id="house" name="house" placeholder="например: 15 или 15А" required>
    </div>
    
    <div class="form-group">
        <label for="apartment">Квартира:</label>
        <input type="text" id="apartment" name="apartment" placeholder="например: 42" required>
    </div>
    
    <div class="address-preview">
        <strong>Полный адрес:</strong> <span id="addressPreview">-</span>
    </div>
    
    <div class="form-group">
        <label for="phone">Телефон:</label>
        <input type="tel" id="phone" name="phone" placeholder="+7 XXX XXX-XX-XX" required>
    </div>
    
    <div class="form-group">
        <label for="start_date">Дата начала договора:</label>
        <input type="date" id="start_date" name="start_date" required>
    </div>
    
    <div class="form-group">
        <label for="amount">Сумма оплаты (руб):</label>
        <input type="number" id="amount" name="amount" step="0.01" value="0">
    </div>
    
    <div class="form-group">
        <button type="submit" class="btn">Добавить клиента</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
    </div>
</form>

<script>
    function updateAddressPreview() {
        const microdistrict = document.getElementById('microdistrict').value;
        const house = document.getElementById('house').value;
        const apartment = document.getElementById('apartment').value;
        
        let preview = '-';
        if (microdistrict || house || apartment) {
            const parts = [];
            if (microdistrict) parts.push(microdistrict);
            if (house) parts.push(house);
            if (apartment) parts.push(apartment);
            preview = parts.join('-');
        }
        document.getElementById('addressPreview').textContent = preview;
    }
    
    document.getElementById('microdistrict').addEventListener('input', updateAddressPreview);
    document.getElementById('house').addEventListener('input', updateAddressPreview);
    document.getElementById('apartment').addEventListener('input', updateAddressPreview);
</script>
{% endblock %}
